<!DOCTYPE html>
<html>
<head>
    <title>JavaScript Variable Tasks</title>
</head>
<body>

    <h1>JavaScript Beginner Tasks</h1>

    <script>

        // Task 1: Variable Practice
        let studentName = "Naveen";
        let studentAge = 18;
        let studentCourse = "MERN Stack";

        console.log(studentName);
        console.log(studentAge);
        console.log(studentCourse);


        // Task 2: Var, Let, Const
        var company = "Stackly";
        let salary = 20000;
        const country = "India";

        company = "Google";
        salary = 30000;

        console.log("Company:", company);
        console.log("Salary:", salary);
        console.log("Country:", country);


        // Task 3: User Name
        let userName = prompt("What is your name?");
        console.log("Welcome " + userName);


        // Task 4: Confirm Box
        let knowsJS = confirm("Do you know JavaScript?");
        console.log(knowsJS);


        // Task 5: Student Information
        let name = prompt("Enter Student Name:");
        let age = prompt("Enter Student Age:");
        let city = prompt("Enter Student City:");

        console.log("Name : " + name);
        console.log("Age : " + age);
        console.log("City : " + city);


        // Task 6: Alert Message
        let course = "JavaScript";
        alert("Welcome to " + course);


        // Task 7: Document Write
        document.writeln("<h3>Hello Student</h3>");
        document.writeln("<h3>Welcome to JavaScript</h3>");


        // Task 8: Favorite Things
        let favoriteFood = "Chicken Biryani";
        let favoriteColor = "Black";
        let favoriteMovie = "Leo";

        console.log("Food : " + favoriteFood);
        console.log("Color : " + favoriteColor);
        console.log("Movie : " + favoriteMovie);


        // Task 9: Mini Bio Data
        let bioName = "Naveen";
        let bioAge = 18;
        let phone = "9876543210";
        let email = "naveen@gmail.com";

        console.log("Name : " + bioName);
        console.log("Age : " + bioAge);
        console.log("Phone : " + phone);
        console.log("Email : " + email);


        // Task 10: Challenge
        let userName2 = prompt("Enter Your Name:");
        let userCourse = prompt("Enter Your Course:");

        alert("Hello " + userName2 + ", Welcome to " + userCourse + " Course");

    </script>

</body>
</html>
